<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATC Garage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Design Tokens ── */
    :root {
      --bg-base:     #0d0d1a;
      --bg-card:     #1a1a2e;
      --bg-elevated: #16213e;
      --bg-hover:    #1e2a4a;
      --gold:        #d4af37;
      --gold-light:  #e8c547;
      --gold-dim:    rgba(212,175,55,0.15);
      --gold-border: rgba(212,175,55,0.25);
      --text-primary:#e8e8f0;
      --text-muted:  #8888aa;
      --text-dim:    #5566aa;
      --success:     #52c052;
      --danger:      #e05252;
      --warning:     #e0a052;
      --info:        #5288e0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

    /* ── Shared Components ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; min-height: 40px;
      padding: 0 clamp(12px, 1.5vw, 20px);
      border-radius: 8px;
      font-size: clamp(11px, 1.1vw, 13px); font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: none;
      font-family: inherit;
    }
    .btn-primary { background: var(--gold); color: #0d0d1a; }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover  { background: #c94444; transform: translateY(-1px); }
    .btn-ghost   { background: transparent; color: var(--text-muted); border: 1px solid var(--gold-border); }
    .btn-ghost:hover   { color: var(--gold); border-color: var(--gold); }
    .btn-sm { min-height: 40px; padding: 0 clamp(8px, 1vw, 14px); font-size: clamp(10px, 1vw, 12px); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px;
      font-size: clamp(9px, 0.9vw, 11px); font-weight: 700;
    }
    .badge-success { background: rgba(82,192,82,0.15); color: var(--success); }
    .badge-danger  { background: rgba(224,82,82,0.15); color: var(--danger); }
    .badge-warning { background: rgba(224,160,82,0.15); color: var(--warning); }
    .badge-gold    { background: var(--gold-dim); color: var(--gold); }
    .badge-info    { background: rgba(82,136,224,0.15); color: var(--info); }

    .input {
      width: 100%; background: var(--bg-elevated);
      border: 1px solid var(--gold-border); border-radius: 8px;
      padding: 10px 14px; color: var(--text-primary);
      font-size: clamp(11px, 1.1vw, 13px); outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    .input:focus { border-color: var(--gold); }
    .input::placeholder { color: var(--text-dim); }

    .close-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer; color: var(--text-muted);
      background: transparent; border: none; font-size: 18px;
      transition: all 0.15s;
    }
    .close-btn:hover { background: rgba(224,82,82,0.15); color: var(--danger); }

    /* ── Layout ── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #app.visible {
      pointer-events: all;
      opacity: 1;
    }

    /* ── Main Panel ── */
    .garage-panel {
      width: clamp(380px, 92vw, 780px);
      max-width: min(780px, 96vw);
      max-height: 92vh;
      background: var(--bg-card);
      border: 1px solid var(--gold-border);
      border-radius: clamp(12px, 1.5vw, 18px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.08);
      animation: panelIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes panelIn {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    /* ── Header ── */
    .panel-header {
      display: flex;
      align-items: center;
      gap: clamp(8px, 1vw, 14px);
      padding: clamp(14px, 2vw, 22px) clamp(14px, 2vw, 22px) clamp(12px, 1.5vw, 18px);
      border-bottom: 1px solid var(--gold-border);
      background: linear-gradient(135deg, rgba(212,175,55,0.06) 0%, transparent 60%);
      flex-shrink: 0;
    }
    .header-icon {
      width: clamp(36px,4vw,44px); height: clamp(36px,4vw,44px);
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(16px, 2vw, 22px);
    }
    .header-text { flex: 1; }
    .header-title {
      color: var(--gold); font-weight: 800;
      font-size: clamp(14px, 1.6vw, 19px);
      letter-spacing: -0.02em;
    }
    .header-sub {
      color: var(--text-dim); font-size: clamp(10px, 1vw, 12px);
      margin-top: 2px;
    }

    /* ── Filter Bar ── */
    .filter-bar {
      padding: clamp(10px, 1.2vw, 16px) clamp(14px, 2vw, 22px);
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1vw, 12px);
      border-bottom: 1px solid rgba(212,175,55,0.1);
      flex-shrink: 0;
    }
    .status-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tab-btn {
      display: inline-flex; align-items: center; gap: 5px;
      min-height: 40px; padding: 0 clamp(10px, 1.2vw, 16px);
      border-radius: 20px;
      font-size: clamp(10px, 1vw, 12px); font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      border: 1px solid transparent;
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--gold); border-color: var(--gold-border); }
    .tab-btn.active {
      background: var(--gold-dim);
      color: var(--gold);
      border-color: var(--gold-border);
    }
    .search-wrap { position: relative; }
    .search-wrap .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); font-size: 14px; pointer-events: none;
    }
    .search-wrap .input { padding-left: 36px; }

    /* ── Vehicle Grid ── */
    .vehicle-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: clamp(12px, 1.5vw, 20px) clamp(14px, 2vw, 22px);
    }
    .vehicle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(clamp(140px, 22vw, 220px), 1fr));
      gap: clamp(10px, 1.2vw, 16px);
    }
    @media (max-width: 520px) {
      .vehicle-grid { grid-template-columns: 1fr; }
    }
    .no-vehicles {
      grid-column: 1 / -1;
      text-align: center;
      padding: clamp(32px, 5vw, 60px) 0;
      color: var(--text-dim);
    }
    .no-vehicles .no-icon { font-size: clamp(32px, 5vw, 52px); margin-bottom: 12px; }
    .no-vehicles p { font-size: clamp(12px, 1.2vw, 14px); }

    /* ── Vehicle Card ── */
    .vehicle-card {
      background: var(--bg-elevated);
      border: 1px solid var(--gold-border);
      border-radius: clamp(8px, 1.2vw, 14px);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .vehicle-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(212,175,55,0.15);
      border-color: rgba(212,175,55,0.5);
    }
    .vehicle-card.expanded { border-color: var(--gold); }

    /* Card banner */
    .card-banner {
      position: relative;
      height: clamp(64px, 8vw, 88px);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .banner-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--banner-c1) 0%, var(--banner-c2) 100%);
      opacity: 0.18;
    }
    .banner-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    }
    .card-banner .category-icon {
      font-size: clamp(28px, 3.5vw, 42px);
      position: relative; z-index: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .banner-status-stripe {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--stripe-color);
      box-shadow: 0 0 8px var(--stripe-color);
    }

    /* Card body */
    .card-body {
      padding: clamp(10px, 1.2vw, 14px);
    }
    .card-top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .vehicle-model {
      color: var(--gold); font-weight: 700;
      font-size: clamp(12px, 1.3vw, 15px);
      line-height: 1.2;
      text-transform: capitalize;
    }
    .plate-badge {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      padding: 2px 7px;
      font-family: 'Courier New', monospace;
      font-size: clamp(9px, 0.85vw, 11px);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: clamp(8px, 1vw, 12px);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* Condition bar */
    .condition-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: clamp(9px, 0.9vw, 11px);
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .condition-bar {
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: clamp(8px, 1vw, 12px);
    }
    .condition-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* Card actions */
    .card-actions {
      display: flex; gap: 6px;
    }
    .card-actions .btn { flex: 1; min-height: 40px; font-size: clamp(10px, 1vw, 12px); }

    /* Expanded stats */
    .card-expanded {
      border-top: 1px solid rgba(212,175,55,0.12);
      padding: clamp(8px, 1vw, 12px) clamp(10px, 1.2vw, 14px);
      display: none;
      animation: expandIn 0.2s ease;
    }
    .card-expanded.show { display: block; }
    @keyframes expandIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-item { text-align: center; }
    .stat-val {
      font-size: clamp(12px, 1.3vw, 15px);
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-lbl {
      font-size: clamp(8px, 0.8vw, 10px);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* ── Footer ── */
    .panel-footer {
      padding: clamp(10px, 1.2vw, 16px) clamp(14px, 2vw, 22px);
      border-top: 1px solid var(--gold-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: rgba(212,175,55,0.03);
    }
    .footer-info {
      font-size: clamp(10px, 0.95vw, 12px);
      color: var(--text-dim);
    }
    .footer-info strong { color: var(--text-muted); }
    .storage-bar {
      display: flex; align-items: center; gap: 8px;
    }
    .storage-track {
      width: clamp(60px, 8vw, 100px);
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
      border-radius: 3px;
    }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: clamp(16px, 3vw, 32px);
      right: clamp(16px, 3vw, 32px);
      display: flex; flex-direction: column; gap: 8px;
      z-index: 9999; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--gold-border);
      border-radius: 10px;
      font-size: clamp(11px, 1.1vw, 13px);
      color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: toastIn 0.25s ease, toastOut 0.3s ease 2.7s forwards;
      pointer-events: none;
      max-width: 300px;
    }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
    .toast-icon { font-size: 16px; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* ── Responsive hardening ── */
    /* Narrow / portrait — collapse multi-column layouts to single column */
    @media (max-width: 820px), (orientation: portrait) {
      .vehicle-grid { grid-template-columns: 1fr !important; }
      .stats-grid   { grid-template-columns: repeat(3, 1fr) !important; }
    }
    /* Short screens — guarantee internal scroll */
    @media (max-height: 640px) {
      .garage-panel      { max-height: 96vh !important; }
      .vehicle-grid-wrap { max-height: 60vh !important; }
    }
    /* Ultra-wide & 4K — scale typography up gracefully */
    @media (min-width: 2560px) {
      :root { font-size: 18px; }
    }
    /* Tiny windows */
    @media (max-width: 480px) {
      .garage-panel { padding: 10px !important; border-radius: 10px !important; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="garage-panel">

    <!-- Header -->
    <div class="panel-header">
      <div class="header-icon">🚗</div>
      <div class="header-text">
        <div class="header-title">Garage</div>
        <div class="header-sub" id="header-sub">Loading vehicles…</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge badge-gold" id="vehicle-count-badge">0 vehicles</span>
        <button class="close-btn" onclick="closePanel()" title="Close (Esc)">✕</button>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="status-tabs">
        <button class="tab-btn active" data-filter="all"      onclick="setFilter('all')">🔹 All</button>
        <button class="tab-btn"        data-filter="garaged"  onclick="setFilter('garaged')">✅ Garaged</button>
        <button class="tab-btn"        data-filter="out"      onclick="setFilter('out')">🟡 Out</button>
        <button class="tab-btn"        data-filter="impounded" onclick="setFilter('impounded')">🔴 Impounded</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="input" id="search-input" type="text" placeholder="Search by plate or model…" oninput="renderGrid()" />
      </div>
    </div>

    <!-- Vehicle Grid -->
    <div class="vehicle-grid-wrap">
      <div class="vehicle-grid" id="vehicle-grid">
        <div class="no-vehicles">
          <div class="no-icon">🚗</div>
          <p>No vehicles found</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="panel-footer">
      <div class="footer-info">
        Total: <strong id="footer-count">0</strong> vehicles &nbsp;|&nbsp;
        Storage: <strong id="footer-storage">0 / 10</strong>
      </div>
      <div class="storage-bar">
        <div class="storage-track">
          <div class="storage-fill" id="storage-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script>
  /* ── State ── */
  let vehicles   = [];
  let activeFilter = 'all';
  let expandedId   = null;

  /* ── Category icons ── */
  const CATEGORY_ICONS = {
    car:        '🚗',
    motorcycle: '🏍️',
    truck:      '🚛',
    aircraft:   '✈️',
    boat:       '⛵',
    default:    '🚘',
  };

  function getCategoryIcon(model) {
    const m = (model || '').toLowerCase();
    if (/bike|motor|cycle|pcj|sanchez|bati|akuma/.test(m)) return CATEGORY_ICONS.motorcycle;
    if (/truck|hauler|packer|phantom|mule|flatbed/.test(m)) return CATEGORY_ICONS.truck;
    if (/plane|jet|lazer|hydra|besra|titan/.test(m))        return CATEGORY_ICONS.aircraft;
    if (/boat|dinghy|jetmax|marquis|tropic/.test(m))        return CATEGORY_ICONS.boat;
    return CATEGORY_ICONS.car;
  }

  /* ── Status helpers ── */
  const STATUS_CONFIG = {
    garaged:   { label: 'Garaged',   badgeClass: 'badge-success', dotColor: '#52c052', stripeColor: '#52c052', bannerC1: '#52c052', bannerC2: '#1a4d1a' },
    out:       { label: 'Out',       badgeClass: 'badge-warning', dotColor: '#e0a052', stripeColor: '#e0a052', bannerC1: '#e0a052', bannerC2: '#4d3010' },
    impounded: { label: 'Impounded', badgeClass: 'badge-danger',  dotColor: '#e05252', stripeColor: '#e05252', bannerC1: '#e05252', bannerC2: '#4d1010' },
  };

  function getStatus(v) {
    return STATUS_CONFIG[v.status] || STATUS_CONFIG.garaged;
  }

  /* ── Condition ── */
  function conditionLabel(pct) {
    if (pct >= 85) return { label: 'Excellent', color: '#52c052' };
    if (pct >= 60) return { label: 'Good',      color: '#89c052' };
    if (pct >= 35) return { label: 'Damaged',   color: '#e0a052' };
    return                 { label: 'Wrecked',  color: '#e05252' };
  }

  function conditionGradient(pct) {
    return `linear-gradient(90deg, #e05252 0%, #e0a052 40%, #52c052 100%)`;
  }

  /* ── Actions ── */
  function retrieveVehicle(vehicleId, e) {
    e && e.stopPropagation();
    nui('atc:vehicles:retrieve', { vehicleId });
    showToast('Retrieving vehicle…', 'info');
  }

  function storeVehicle(vehicleId, e) {
    e && e.stopPropagation();
    nui('atc:vehicles:store', { vehicleId });
    showToast('Storing vehicle…', 'info');
  }

  function payFine(vehicleId, e) {
    e && e.stopPropagation();
    nui('atc:vehicles:payFine', { vehicleId });
    showToast('Processing fine payment…', 'info');
  }

  /* ── Card expand toggle ── */
  function toggleExpand(vehicleId) {
    expandedId = expandedId === vehicleId ? null : vehicleId;
    renderGrid();
  }

  /* ── Render ── */
  function renderGrid() {
    const grid    = document.getElementById('vehicle-grid');
    const search  = (document.getElementById('search-input').value || '').toLowerCase();
    const storage = Math.min(vehicles.length, 10);

    let filtered = vehicles.filter(v => {
      const matchFilter = activeFilter === 'all' || v.status === activeFilter;
      const matchSearch = !search ||
        (v.plate  || '').toLowerCase().includes(search) ||
        (v.model  || '').toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    // Update header counts
    document.getElementById('vehicle-count-badge').textContent = vehicles.length + ' vehicle' + (vehicles.length !== 1 ? 's' : '');
    document.getElementById('header-sub').textContent          = `${vehicles.length} total · ${vehicles.filter(v=>v.status==='garaged').length} garaged`;
    document.getElementById('footer-count').textContent        = vehicles.length;
    document.getElementById('footer-storage').textContent      = `${storage} / 10`;
    document.getElementById('storage-fill').style.width        = (storage / 10 * 100) + '%';

    if (!filtered.length) {
      grid.innerHTML = `
        <div class="no-vehicles">
          <div class="no-icon">🔍</div>
          <p>No vehicles match your search</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(v => {
      const sc        = getStatus(v);
      const condPct   = Math.max(0, Math.min(100, v.condition ?? 100));
      const cond      = conditionLabel(condPct);
      const icon      = getCategoryIcon(v.model);
      const expanded  = expandedId === v.vehicleId;

      let actionBtn = '';
      if (v.status === 'garaged') {
        actionBtn = `<button class="btn btn-primary btn-sm" style="flex:1" onclick="retrieveVehicle('${v.vehicleId}', event)">Retrieve →</button>`;
      } else if (v.status === 'out') {
        actionBtn = `<button class="btn btn-ghost btn-sm" style="flex:1" onclick="storeVehicle('${v.vehicleId}', event)">Store</button>`;
      } else {
        actionBtn = `<button class="btn btn-danger btn-sm" style="flex:1" onclick="payFine('${v.vehicleId}', event)">Pay Fine $2,500</button>`;
      }

      return `
        <div class="vehicle-card ${expanded ? 'expanded' : ''}" onclick="toggleExpand('${v.vehicleId}')">
          <div class="card-banner" style="--banner-c1:${sc.bannerC1};--banner-c2:${sc.bannerC2};--stripe-color:${sc.stripeColor}">
            <div class="banner-bg"></div>
            <div class="banner-shimmer"></div>
            <span class="category-icon">${icon}</span>
            <div class="banner-status-stripe"></div>
          </div>
          <div class="card-body">
            <div class="card-top-row">
              <div class="vehicle-model">${escHtml(v.model || 'Unknown')}</div>
              <div class="plate-badge">${escHtml(v.plate || '---')}</div>
            </div>
            <div class="card-meta">
              <span class="status-dot" style="background:${sc.dotColor};box-shadow:0 0 5px ${sc.dotColor}60"></span>
              <span class="badge ${sc.badgeClass}">${sc.label}</span>
            </div>
            <div class="condition-label">
              <span>Condition</span>
              <span style="color:${cond.color};font-weight:600">${cond.label}</span>
            </div>
            <div class="condition-bar">
              <div class="condition-fill" style="width:${condPct}%;background:${conditionGradient(condPct)}"></div>
            </div>
            <div class="card-actions">${actionBtn}</div>
          </div>
          <div class="card-expanded ${expanded ? 'show' : ''}">
            <div class="stats-grid">
              <div class="stat-item">
                <div class="stat-val">${Math.round(v.fuel ?? 100)}%</div>
                <div class="stat-lbl">Fuel</div>
              </div>
              <div class="stat-item">
                <div class="stat-val">${(v.mileage || 0).toLocaleString()}</div>
                <div class="stat-lbl">Miles</div>
              </div>
              <div class="stat-item">
                <div class="stat-val">${v.modifications || 0}</div>
                <div class="stat-lbl">Mods</div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  /* ── Filter ── */
  function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    renderGrid();
  }

  /* ── Panel open/close ── */
  function openPanel(data) {
    vehicles = (data && data.vehicles) ? data.vehicles : DEMO_VEHICLES;
    document.getElementById('app').classList.add('visible');
    renderGrid();
  }

  function closePanel() {
    document.getElementById('app').classList.remove('visible');
    nui('atc:vehicles:close', {});
  }

  /* ── NUI bridge ── */
  function nui(callback, data) {
    fetch(`https://atc-vehicles/${callback}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    }).catch(() => {});
  }

  /* ── Toast ── */
  function showToast(message, type = 'info') {
    const icons = { success: '✅', error: '❌', info: '💡', warning: '⚠️' };
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="toast-icon">${icons[type] || '💬'}</span><span>${escHtml(message)}</span>`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3100);
  }

  /* ── Utils ── */
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── ESC key ── */
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  /* ── NUI Message handler ── */
  window.addEventListener('message', e => {
    const { type, payload } = e.data || {};
    if (type === 'ATC_GARAGE_OPEN')   openPanel(payload);
    if (type === 'ATC_GARAGE_CLOSE')  closePanel();
    if (type === 'ATC_GARAGE_RESULT') {
      if (payload && payload.message) {
        showToast(payload.message, payload.success ? 'success' : 'error');
      }
      if (payload && payload.vehicles) {
        vehicles = payload.vehicles;
        renderGrid();
      }
    }
  });

  /* ── Demo data (dev preview) ── */
  const DEMO_VEHICLES = [
    { vehicleId: 'v1', model: 'Sultan RS',    plate: 'ATC-001', status: 'garaged',   condition: 92, fuel: 87,  mileage: 14250, modifications: 8 },
    { vehicleId: 'v2', model: 'Elegy Retro',  plate: 'ATC-002', status: 'out',       condition: 68, fuel: 45,  mileage: 31890, modifications: 5 },
    { vehicleId: 'v3', model: 'Zentorno',     plate: 'ATC-003', status: 'garaged',   condition: 100,fuel: 100, mileage: 2100,  modifications: 12},
    { vehicleId: 'v4', model: 'PCJ-600',      plate: 'ATC-004', status: 'impounded', condition: 34, fuel: 22,  mileage: 8765,  modifications: 2 },
    { vehicleId: 'v5', model: 'Titan Cargo',  plate: 'ATC-005', status: 'garaged',   condition: 55, fuel: 60,  mileage: 54000, modifications: 0 },
    { vehicleId: 'v6', model: 'Lazer Jet',    plate: 'ATC-006', status: 'out',       condition: 80, fuel: 70,  mileage: 9900,  modifications: 3 },
  ];

  /* Auto-open in standalone browser preview */
  if (window.location.protocol === 'file:') {
    openPanel({ vehicles: DEMO_VEHICLES });
  }

  // Browser preview seeding — runs only outside FiveM (no GetParentResourceName / invokeNative)
  if (typeof window !== 'undefined' && !window.invokeNative) {
    window.addEventListener('DOMContentLoaded', () => {
      window.postMessage({ type: 'ATC_GARAGE_OPEN', payload: { vehicles: DEMO_VEHICLES } }, '*');
    });
  }
</script>
</body>
</html>
