<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATC Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Design Tokens ── */
    :root {
      --bg-base:     #0d0d1a;
      --bg-card:     #1a1a2e;
      --bg-elevated: #16213e;
      --bg-hover:    #1e2a4a;
      --gold:        #d4af37;
      --gold-light:  #e8c547;
      --gold-dim:    rgba(212,175,55,0.15);
      --gold-border: rgba(212,175,55,0.25);
      --text-primary:#e8e8f0;
      --text-muted:  #8888aa;
      --text-dim:    #5566aa;
      --success:     #52c052;
      --danger:      #e05252;
      --warning:     #e0a052;
      --info:        #5288e0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 2px; }

    /* ── Shared ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 5px; min-height: 40px;
      padding: 0 clamp(10px, 1.2vw, 16px);
      border-radius: 8px;
      font-size: clamp(11px, 1.1vw, 13px); font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: none;
      font-family: inherit;
    }
    .btn-primary { background: var(--gold); color: #0d0d1a; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover  { background: #c94444; }
    .btn-warning { background: var(--warning); color: #0d0d1a; }
    .btn-warning:hover { background: #e8b060; }
    .btn-ghost   { background: transparent; color: var(--text-muted); border: 1px solid var(--gold-border); }
    .btn-ghost:hover   { color: var(--gold); border-color: var(--gold); }
    .btn-full { width: 100%; }

    .textarea {
      width: 100%; background: var(--bg-elevated);
      border: 1px solid var(--gold-border); border-radius: 8px;
      padding: 10px 14px; color: var(--text-primary);
      font-size: clamp(11px, 1.1vw, 13px); outline: none;
      transition: border-color 0.15s; font-family: inherit;
      resize: vertical; min-height: 64px; max-height: 120px;
    }
    .textarea:focus { border-color: var(--gold); }
    .textarea::placeholder { color: var(--text-dim); }

    .close-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer; color: var(--text-muted);
      background: transparent; border: none; font-size: 16px;
      transition: all 0.15s;
    }
    .close-btn:hover { background: rgba(224,82,82,0.15); color: var(--danger); }

    /* ── Layout ── */
    #app {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #app.visible {
      pointer-events: all;
      opacity: 1;
    }

    /* ── Side Panel ── */
    .admin-panel {
      position: absolute;
      right: clamp(12px, 2vw, 24px);
      top: 50%;
      transform: translateY(-50%);
      width: clamp(260px, 85vw, 340px);
      max-height: 90vh;
      background: var(--bg-card);
      border: 1px solid var(--gold-border);
      border-radius: clamp(10px, 1.3vw, 16px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: -8px 0 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.05);
      animation: slideIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-50%) translateX(20px); }
      to   { opacity: 1; transform: translateY(-50%) translateX(0); }
    }

    /* ── Header ── */
    .panel-header {
      padding: clamp(12px, 1.4vw, 18px);
      border-bottom: 1px solid var(--gold-border);
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, rgba(212,175,55,0.07) 0%, transparent 60%);
      flex-shrink: 0;
    }
    .header-icon {
      font-size: clamp(18px, 2vw, 22px);
    }
    .header-title {
      flex: 1;
      color: var(--gold); font-weight: 800;
      font-size: clamp(13px, 1.4vw, 16px);
      letter-spacing: -0.01em;
    }
    .status-dot-wrap {
      display: flex; align-items: center; gap: 5px;
      font-size: clamp(9px, 0.9vw, 11px);
      color: var(--text-dim);
    }
    .server-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    /* ── Server Stats ── */
    .server-stats {
      padding: clamp(8px, 1vw, 12px) clamp(12px, 1.4vw, 18px);
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(212,175,55,0.08);
      flex-shrink: 0;
    }
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
    }
    .stat-chip-val {
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-chip-lbl {
      font-size: clamp(8px, 0.8vw, 10px);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-chip-val.gold { color: var(--gold); }

    /* ── Section header ── */
    .section-head {
      padding: clamp(8px, 1vw, 12px) clamp(12px, 1.4vw, 18px) 4px;
      font-size: clamp(9px, 0.85vw, 10px);
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    /* ── Player List ── */
    .player-list {
      flex: 0 0 auto;
      max-height: 40vh;
      overflow-y: auto;
      padding: 4px 0;
    }
    .player-row {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 clamp(12px, 1.4vw, 18px);
      height: 52px;
      cursor: default;
      transition: background 0.12s;
    }
    .player-row:nth-child(even) { background: rgba(255,255,255,0.015); }
    .player-row:hover { background: var(--bg-hover); }

    .player-row:hover .player-actions { opacity: 1; }

    .src-badge {
      min-width: 28px; height: 20px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(8px, 0.8vw, 10px);
      font-weight: 700;
      color: var(--gold);
      font-family: 'Courier New', monospace;
      flex-shrink: 0;
    }
    .player-name {
      flex: 1;
      font-size: clamp(11px, 1.05vw, 13px);
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .ping-badge {
      font-size: clamp(8px, 0.8vw, 10px);
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── Action icons (appear on row hover) ── */
    .player-actions {
      display: flex;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .action-icon-btn {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
      background: transparent; border: none;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.12s;
      position: relative;
    }
    .action-icon-btn:hover { background: var(--bg-card); }
    .action-icon-btn[data-action="kick"]:hover  { background: rgba(224,160,82,0.2); }
    .action-icon-btn[data-action="ban"]:hover   { background: rgba(224,82,82,0.2); }
    /* Tooltip */
    .action-icon-btn::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%; transform: translateX(-50%);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 10px; font-weight: 600;
      padding: 3px 7px; border-radius: 5px;
      border: 1px solid var(--gold-border);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
      z-index: 10;
      font-family: Inter, sans-serif;
    }
    .action-icon-btn:hover::after { opacity: 1; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(212,175,55,0.08);
      margin: 4px 0;
      flex-shrink: 0;
    }

    /* ── Quick Actions ── */
    .quick-actions {
      padding: clamp(8px, 1vw, 12px) clamp(12px, 1.4vw, 18px);
      display: flex; flex-direction: column; gap: 8px;
      flex-shrink: 0;
    }
    .announce-row {
      display: flex; gap: 6px; align-items: flex-end;
    }
    .announce-row .textarea { flex: 1; min-height: 44px; }
    .announce-row .btn {
      flex-shrink: 0;
      min-height: 44px;
      padding: 0 12px;
    }
    .action-row {
      display: flex; gap: 6px;
    }
    .action-row .btn { flex: 1; min-height: 40px; font-size: clamp(10px, 1vw, 12px); }

    /* ── Confirm overlay ── */
    .confirm-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(13,13,26,0.85);
      backdrop-filter: blur(4px);
      border-radius: inherit;
      z-index: 20;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      animation: fadeIn 0.15s ease;
    }
    .confirm-overlay.show { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    .confirm-title {
      font-size: clamp(13px, 1.3vw, 15px);
      font-weight: 700;
      color: var(--danger);
    }
    .confirm-sub {
      font-size: clamp(10px, 1vw, 12px);
      color: var(--text-muted);
    }
    .confirm-btns {
      display: flex; gap: 8px; width: 100%;
    }
    .confirm-btns .btn { flex: 1; min-height: 40px; }

    /* ── Empty state ── */
    .empty-list {
      padding: 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: clamp(10px, 1vw, 12px);
    }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: clamp(12px, 2vw, 24px);
      left: clamp(12px, 2vw, 24px);
      display: flex; flex-direction: column; gap: 6px;
      z-index: 9999; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      font-size: clamp(10px, 1vw, 12px);
      color: var(--text-primary);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      animation: toastIn 0.2s ease, toastOut 0.3s ease 2.7s forwards;
      max-width: 280px;
    }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
    .toast.warning { border-color: var(--warning); }
    @keyframes toastIn  { from { opacity:0; transform:translateX(-15px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateX(-15px); } }
  </style>
</head>
<body>

<div id="app">
  <div class="admin-panel">

    <!-- Confirm overlay -->
    <div class="confirm-overlay" id="confirm-overlay">
      <div class="confirm-title" id="confirm-title">⚠️ Are you sure?</div>
      <div class="confirm-sub"  id="confirm-sub">This action cannot be undone.</div>
      <div class="confirm-btns">
        <button class="btn btn-ghost"   onclick="hideConfirm()">Cancel</button>
        <button class="btn btn-danger"  id="confirm-ok-btn">Confirm</button>
      </div>
    </div>

    <!-- Header -->
    <div class="panel-header">
      <span class="header-icon">🛡️</span>
      <span class="header-title">Admin Panel</span>
      <div class="status-dot-wrap">
        <div class="server-dot"></div>
        <span>Live</span>
      </div>
      <button class="close-btn" onclick="closePanel()" title="Close (Esc)">✕</button>
    </div>

    <!-- Server Stats -->
    <div class="server-stats">
      <div class="stat-chip">
        <div class="stat-chip-val gold" id="stat-online">0</div>
        <div class="stat-chip-lbl">Online</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-val">32</div>
        <div class="stat-chip-lbl">Max</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-val" id="stat-uptime">00:00</div>
        <div class="stat-chip-lbl">Uptime</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-val" id="stat-avg-ping">—</div>
        <div class="stat-chip-lbl">Avg Ping</div>
      </div>
    </div>

    <!-- Players Section -->
    <div class="section-head">Players</div>
    <div class="player-list" id="player-list">
      <div class="empty-list">No players online</div>
    </div>

    <div class="divider"></div>

    <!-- Quick Actions -->
    <div class="section-head">Quick Actions</div>
    <div class="quick-actions">

      <!-- Announce -->
      <div class="announce-row">
        <textarea class="textarea" id="announce-input" placeholder="Server announcement…" rows="2"></textarea>
        <button class="btn btn-primary" onclick="sendAnnounce()" title="Send Announcement">📢</button>
      </div>

      <!-- Action buttons -->
      <div class="action-row">
        <button class="btn btn-warning" onclick="reviveAll()">♻️ Revive All</button>
        <button class="btn btn-danger"  onclick="promptClearArea()">🧹 Clear Area</button>
      </div>

    </div>

  </div>
</div>

<div id="toast-container"></div>

<script>
  /* ── State ── */
  let players  = [];
  let startTime = Date.now();

  /* ── Open / Close ── */
  function openPanel(data) {
    players   = (data && data.players) ? data.players : DEMO_PLAYERS;
    startTime = Date.now() - (data && data.uptimeMs ? data.uptimeMs : 0);
    document.getElementById('app').classList.add('visible');
    renderPlayers();
    updateStats();
  }
  function closePanel() {
    document.getElementById('app').classList.remove('visible');
    nui('atc:admin:close', {});
  }

  /* ── Render players ── */
  function renderPlayers() {
    const list = document.getElementById('player-list');
    if (!players.length) {
      list.innerHTML = '<div class="empty-list">No players online</div>';
      return;
    }
    list.innerHTML = players.map(p => {
      const ping    = p.ping ?? 0;
      let pingColor = 'var(--success)';
      if (ping >= 200) pingColor = 'var(--danger)';
      else if (ping >= 100) pingColor = 'var(--warning)';

      return `
        <div class="player-row" data-id="${p.id}">
          <div class="src-badge">#${p.id}</div>
          <div class="player-name" title="${escHtml(p.name)}">${escHtml(p.name)}</div>
          <div class="ping-badge" style="background:${pingColor}22;color:${pingColor}">${ping}ms</div>
          <div class="player-actions">
            <button class="action-icon-btn" data-action="spectate" title="Spectate" onclick="adminAction('spectate',${p.id})">👁️</button>
            <button class="action-icon-btn" data-action="bring"    title="Bring"    onclick="adminAction('bring',${p.id})">⬆️</button>
            <button class="action-icon-btn" data-action="goto"     title="Go To"    onclick="adminAction('goto',${p.id})">⬇️</button>
            <button class="action-icon-btn" data-action="freeze"   title="Freeze"   onclick="adminAction('freeze',${p.id})">❄️</button>
            <button class="action-icon-btn" data-action="kick"     title="Kick"     onclick="promptKick(${p.id},'${escHtml(p.name)}')">👢</button>
            <button class="action-icon-btn" data-action="ban"      title="Ban"      onclick="promptBan(${p.id},'${escHtml(p.name)}')">🔨</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ── Update stats ── */
  function updateStats() {
    document.getElementById('stat-online').textContent = players.length;
    const totalPing = players.reduce((s, p) => s + (p.ping || 0), 0);
    const avgPing   = players.length ? Math.round(totalPing / players.length) : null;
    document.getElementById('stat-avg-ping').textContent = avgPing !== null ? avgPing + 'ms' : '—';
    updateUptime();
  }

  function updateUptime() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    const el = document.getElementById('stat-uptime');
    if (el) el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  /* ── Admin actions ── */
  function adminAction(action, id) {
    nui(`atc:admin:${action}`, { id });
    showToast(`${action.charAt(0).toUpperCase()+action.slice(1)} → #${id}`, 'info');
  }

  /* ── Kick / Ban prompts ── */
  function promptKick(id, name) {
    showConfirm(
      `👢 Kick ${name}?`,
      `Player #${id} will be removed from the server.`,
      () => { nui('atc:admin:kick', { id, reason: 'Admin kick' }); showToast(`Kicked #${id}`, 'warning'); }
    );
  }
  function promptBan(id, name) {
    showConfirm(
      `🔨 Ban ${name}?`,
      `Player #${id} will be permanently banned.`,
      () => { nui('atc:admin:ban', { id, reason: 'Admin ban' }); showToast(`Banned #${id}`, 'error'); }
    );
  }
  function promptClearArea() {
    showConfirm(
      '🧹 Clear Area?',
      'This will remove all nearby entities. Cannot be undone.',
      () => { nui('atc:admin:clearArea', {}); showToast('Area cleared', 'warning'); }
    );
  }

  /* ── Announce ── */
  function sendAnnounce() {
    const msg = (document.getElementById('announce-input').value || '').trim();
    if (!msg) { showToast('Enter a message first', 'error'); return; }
    nui('atc:admin:announce', { message: msg });
    document.getElementById('announce-input').value = '';
    showToast('Announcement sent', 'success');
  }

  function reviveAll() {
    nui('atc:admin:reviveAll', {});
    showToast('All players revived', 'success');
  }

  /* ── Confirm ── */
  let confirmCallback = null;
  function showConfirm(title, sub, cb) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-sub').textContent   = sub;
    confirmCallback = cb;
    document.getElementById('confirm-overlay').classList.add('show');
    document.getElementById('confirm-ok-btn').onclick = () => { hideConfirm(); cb && cb(); };
  }
  function hideConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
    confirmCallback = null;
  }

  /* ── NUI bridge ── */
  function nui(callback, data) {
    fetch(`https://atc-admin/${callback}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    }).catch(() => {});
  }

  /* ── Toast ── */
  function showToast(message, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type] || '💬'}</span><span>${escHtml(message)}</span>`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3100);
  }

  /* ── Utils ── */
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── ESC key ── */
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  /* ── NUI messages ── */
  window.addEventListener('message', e => {
    const { type, payload } = e.data || {};
    if (type === 'ATC_ADMIN_OPEN')  openPanel(payload);
    if (type === 'ATC_ADMIN_CLOSE') closePanel();
    if (type === 'ATC_ADMIN_PLAYERS_UPDATE') {
      players = payload.players || [];
      renderPlayers();
      updateStats();
    }
  });

  /* ── Uptime ticker ── */
  setInterval(updateUptime, 1000);

  /* ── Demo ── */
  const DEMO_PLAYERS = [
    { id: 1,  name: 'Kalin0x',       ping: 42  },
    { id: 7,  name: 'AtlasRacer99',  ping: 87  },
    { id: 12, name: 'ShadowByte',    ping: 145 },
    { id: 18, name: 'GhostDriver',   ping: 210 },
    { id: 23, name: 'CrimsonWolf',   ping: 66  },
  ];

  if (window.location.protocol === 'file:') {
    openPanel({ players: DEMO_PLAYERS, uptimeMs: 3600000 });
  }
</script>
</body>
</html>
