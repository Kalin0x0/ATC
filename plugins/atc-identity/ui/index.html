<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATC Identity</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0d0d1a;
      --bg-card:    #1a1a2e;
      --bg-input:   #0f0f1f;
      --border:     #2a2a45;
      --gold:       #d4af37;
      --gold-hover: #e8c84a;
      --gold-dim:   rgba(212,175,55,0.15);
      --text:       #e8e8f0;
      --text-muted: #8888aa;
      --danger:     #e05555;
      --success:    #48bb78;
      --radius:     8px;
      --font:       'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: var(--font);
      color: var(--text);
    }

    /* ── Overlay ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 480px;
      padding: 32px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .card-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }

    .card-header .brand-bar {
      width: 4px; height: 28px;
      background: var(--gold);
      border-radius: 2px;
    }

    .card-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .card-header span.sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-left: 4px;
    }

    /* ── Character List ── */
    #screen-list { display: none; }
    #screen-list.active { display: block; }

    .char-list {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 20px;
      max-height: 320px;
      overflow-y: auto;
    }

    .char-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .char-card:hover {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    .char-card .char-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .char-card .char-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 24px 0;
    }

    /* ── Create Form ── */
    #screen-create { display: none; }
    #screen-create.active { display: block; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 13px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--gold); }
    input::placeholder { color: var(--text-muted); }

    select option { background: var(--bg-card); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--gold);
      color: #0d0d1a;
      width: 100%;
      margin-top: 6px;
    }

    .btn-primary:hover:not(:disabled) { background: var(--gold-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

    .btn-row {
      display: flex; gap: 10px; margin-top: 8px;
    }

    .btn-row .btn { flex: 1; }

    /* ── Alerts ── */
    .alert {
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
      display: none;
    }

    .alert.show { display: block; }
    .alert-error   { background: rgba(224,85,85,0.15); border: 1px solid var(--danger);  color: var(--danger); }
    .alert-success { background: rgba(72,187,120,0.15); border: 1px solid var(--success); color: var(--success); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="overlay">
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="brand-bar"></div>
      <h1>Atlantic Core <span class="sub">Identity</span></h1>
    </div>

    <!-- Screen: Character List -->
    <div id="screen-list">
      <div class="char-list" id="char-list"></div>
      <button class="btn btn-primary" id="btn-new-char">+ Create New Character</button>
    </div>

    <!-- Screen: Character Creation -->
    <div id="screen-create">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" placeholder="John" maxlength="32" />
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" placeholder="Doe" maxlength="32" />
      </div>
      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender">
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="non_binary">Non-binary</option>
        </select>
      </div>
      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input id="dob" type="date" max="2007-12-31" min="1940-01-01" />
      </div>

      <div id="alert-create" class="alert"></div>

      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-back">Back</button>
        <button class="btn btn-primary" id="btn-submit">Create Character</button>
      </div>
    </div>

  </div>
</div>

<script>
  'use strict';

  const el = id => document.getElementById(id);

  // ── Screen routing ──────────────────────────────────────────────────────────
  function showScreen(name) {
    el('screen-list').classList.remove('active');
    el('screen-create').classList.remove('active');
    el('screen-' + name).classList.add('active');
  }

  // ── NUI message handler ─────────────────────────────────────────────────────
  window.addEventListener('message', ({ data }) => {
    if (!data || !data.type) return;

    switch (data.type) {
      case 'ATC_IDENTITY_CHARACTER_LIST':
        renderCharList(data.payload || []);
        showScreen('list');
        break;

      case 'ATC_IDENTITY_CHARACTER_CREATED':
        showAlert('alert-create', 'Character created!', 'success');
        el('btn-submit').disabled = false;
        // Server will push a new character list; switch back after short delay
        setTimeout(() => {
          clearForm();
          showScreen('list');
        }, 1200);
        break;

      case 'ATC_IDENTITY_CHARACTER_CREATE_ERROR':
        showAlert('alert-create', (data.payload && data.payload.message) || 'Creation failed.', 'error');
        el('btn-submit').disabled = false;
        break;
    }
  });

  // ── Character list rendering ────────────────────────────────────────────────
  function renderCharList(chars) {
    const list = el('char-list');
    list.innerHTML = '';

    if (!chars.length) {
      list.innerHTML = '<p class="empty-state">No characters found.<br>Create your first character below.</p>';
      return;
    }

    chars.forEach(c => {
      const div = document.createElement('div');
      div.className = 'char-card';
      div.innerHTML = `
        <div class="char-name">${esc(c.firstName)} ${esc(c.lastName)}</div>
        <div class="char-meta">${esc(c.gender || '')} &middot; Born ${esc(c.dateOfBirth || '')}</div>
      `;
      div.addEventListener('click', () => selectCharacter(c.id));
      list.appendChild(div);
    });
  }

  function selectCharacter(id) {
    invokeNui('atc:identity:character:select', { characterId: id }, () => {});
  }

  // ── Form ────────────────────────────────────────────────────────────────────
  el('btn-new-char').addEventListener('click', () => {
    clearForm();
    showScreen('create');
  });

  el('btn-back').addEventListener('click', () => showScreen('list'));

  el('btn-submit').addEventListener('click', () => {
    const firstName   = el('firstName').value.trim();
    const lastName    = el('lastName').value.trim();
    const gender      = el('gender').value;
    const dateOfBirth = el('dob').value;

    if (!firstName || !lastName || !dateOfBirth) {
      showAlert('alert-create', 'All fields are required.', 'error');
      return;
    }

    el('btn-submit').disabled = true;
    hideAlert('alert-create');

    invokeNui('atc:identity:character:create', { firstName, lastName, gender, dateOfBirth }, () => {});
  });

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function showAlert(id, message, type) {
    const el_ = el(id);
    el_.textContent = message;
    el_.className   = 'alert show alert-' + type;
  }

  function hideAlert(id) {
    const el_ = el(id);
    el_.className = 'alert';
    el_.textContent = '';
  }

  function clearForm() {
    el('firstName').value = '';
    el('lastName').value  = '';
    el('dob').value       = '';
    el('gender').value    = 'male';
    hideAlert('alert-create');
    el('btn-submit').disabled = false;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function invokeNui(endpoint, data, cb) {
    fetch(`https://atc-identity/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })
      .then(r => r.json())
      .then(cb)
      .catch(() => cb(null));
  }
</script>

</body>
</html>
